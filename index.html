<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wahab Watches</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  text-align: center;
  padding: 15px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: green;
  color: white;
  border: none;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: darkgreen;
}
</style>

</head>

<body>

<header>
  <h1>Wahab Watches Store</h1>
  <p>Best Quality Watches in Pakistan</p>
</header>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Watch">
    <h3>Luxury Watch</h3>
    <p>Rs 2500</p>
    <a href="https://wa.me/92XXXXXXXXXX">
      <button>Order on WhatsApp</button>
    </a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Watch">
    <h3>Smart Watch</h3>
    <p>Rs 3000</p>
    <a href="https://wa.me/92XXXXXXXXXX">
      <button>Order on WhatsApp</button>
    </a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Watch">
    <h3>Classic Watch</h3>
    <p>Rs 2000</p>
    <a href="https://wa.me/92XXXXXXXXXX">
      <button>Order on WhatsApp</button>
    </a>
  </div>

</div>

</body>
</html
